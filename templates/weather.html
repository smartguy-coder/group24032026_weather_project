<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>поточна погода</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333;">
    <div style="max-width: 600px; margin: 0 auto;">
        <h2>🌤 Поточна погода</h2>

        <table cellpadding="8" cellspacing="0" border="1" style="border-collapse: collapse; width: 100%;">
            <tr>
                <td><strong>Температура</strong></td>
                <td>{{ temperature }} °C</td>
            </tr>
            <tr>
                <td><strong>Швидкість вітру</strong></td>
                <td>{{ wind_speed }} м/с</td>
            </tr>
            <tr>
                <td><strong>Опис (тимчасово англійською мовою)</strong></td>
                <td>{{ description }}</td>
            </tr>
        </table>

        <p style="margin-top: 20px;">
            Гарного дня! 😊
        </p>
    </div>
</body>
</html>
